<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Controle de Estoque</h1>
      <p>Cadastro de produtos e lista de desejos consumindo API.</p>
    </header>

    <main>
      <section class="api-config card">
        <h2>Configuração da API</h2>
        <label for="apiBaseUrl">URL base da API</label>
        <div class="inline">
          <input id="apiBaseUrl" type="url" placeholder="https://sua-api.com" />
          <button id="saveApiBaseUrl" type="button">Salvar</button>
        </div>
        <small id="apiStatus" role="status"></small>
      </section>

      <nav class="tabs" aria-label="Navegação principal">
        <button class="tab-button active" data-tab="produtos">Cadastro de Produto</button>
        <button class="tab-button" data-tab="desejos">Cadastro Lista de Desejos</button>
      </nav>

      <section id="produtos" class="tab-panel active card">
        <h2>Cadastro de Produto</h2>
        <form id="produtoForm">
          <label>
            Nome
            <input name="nome" type="text" required />
          </label>

          <label>
            SKU
            <input name="sku" type="text" required />
          </label>

          <label>
            Quantidade
            <input name="quantidade" type="number" min="0" step="1" required />
          </label>

          <label>
            Preço
            <input name="preco" type="number" min="0" step="0.01" required />
          </label>

          <button type="submit">Cadastrar Produto</button>
        </form>

        <h3>Produtos cadastrados</h3>
        <button id="refreshProdutos" type="button" class="secondary">Atualizar lista</button>
        <ul id="produtoLista" class="list"></ul>
      </section>

      <section id="desejos" class="tab-panel card">
        <h2>Cadastro Lista de Desejos</h2>
        <form id="desejoForm">
          <label>
            Nome do item
            <input name="nome" type="text" required />
          </label>

          <label>
            Prioridade
            <select name="prioridade" required>
              <option value="baixa">Baixa</option>
              <option value="media">Média</option>
              <option value="alta">Alta</option>
            </select>
          </label>

          <label>
            Observação
            <textarea name="observacao" rows="3"></textarea>
          </label>

          <button type="submit">Cadastrar Desejo</button>
        </form>

        <h3>Itens da lista de desejos</h3>
        <button id="refreshDesejos" type="button" class="secondary">Atualizar lista</button>
        <ul id="desejoLista" class="list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
